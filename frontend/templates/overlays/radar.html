{% extends "base/base_overlay.html" %}

{% block title %}Radar{% endblock %}

{% block content %}
<div class="radar-container">
    <div class="radar-line horizontal"></div>
    <div class="radar-line vertical"></div>

    <div class="my-car"></div>

    <!-- front/rear lines -->
    <div id="fb-ahead" class="fb-box ahead">
        <div class="clipper"></div>
    </div>
    <div id="fb-behind" class="fb-box behind">
        <div class="clipper"></div>
    </div>

    <!-- side -->
    <div id="side-left"  class="side-box left"></div>
    <div id="side-right" class="side-box right"></div>
</div>
{% endblock %}

{% block scripts %}
<script>
// Handles fetching data and rendering the radar overlay
class RadarUpdater extends BaseUpdater {
    constructor() {
        super({ endpoint: '/api/radar', updateInterval: 100, overlayName: 'radar' });
        this.MAX_DIST = 15.0;
        this.RADAR_H = 260;
        this.CENTER_Y = this.RADAR_H / 2;
        this.MAX_SHOW_DIST = 15.0;
    }

    async init() {
        await super.init();

        // Get saved radar visibility mode
        this.radarMode = await window.electronAPI.getRadarVisibility?.('radar');

        // Listen for updates to the radar visibility mode
        window.electronAPI.onRadarVisibilityUpdate?.((mode) => {
            this.radarMode = mode;
        });
    }
    async renderOverlay(data) {
        this.renderRadar(data);
    }

    // Front/rear lane control
    setFB(el, dist, severity) {
        el.classList.remove("sev-red","sev-yellow","sev-gray");

        if(dist == null){
            el.style.opacity = 0;
            return;
        }
        el.style.opacity = 1;

        switch(severity){
            case "red": el.classList.add("sev-red"); break;
            case "yellow": el.classList.add("sev-yellow"); break;
            default: el.classList.add("sev-gray");
        }
    }

    // Side indicator controls
    setSide(el, info){
        el.classList.remove("red","gray");

        if(!info){
            el.style.opacity = 0;
            return;
        }

        el.style.opacity = 1;
        el.style.top = this.CENTER_Y + "px";
        // side ones are always red according to
        // the current implementation of the service
        el.classList.add("red");
    }

    // Render DOM elements
    renderRadar(data) {
        this.setFB(document.getElementById("fb-ahead"), data.ahead_m, data.ahead_severity);
        this.setFB(document.getElementById("fb-behind"), data.behind_m, data.behind_severity);

        this.setSide(document.getElementById("side-left"), data.left);
        this.setSide(document.getElementById("side-right"), data.right);

        this.updateRadarVisibility(data);
    }

    // Update radar visibility based on the current mode and distances
    updateRadarVisibility(data) {
        const el = document.querySelector(".radar-container");

        const mode = this.radarMode;

        const distances = [];
        if (data.ahead_m != null) distances.push(data.ahead_m);
        if (data.behind_m != null) distances.push(data.behind_m);

        const nearest = distances.length ? Math.min(...distances) : null;

        // Always show if any cars are nearby
        if (data.left || data.right) {
            el.style.display = 'block';
            el.style.opacity = 1;
            return;
        }

        // Always show overlay
        if (mode === 'show') {
            el.style.display = 'block';
            el.style.opacity = 1;
            return;
        }

        // Hide if no cars nearby
        if (mode === 'hide') {
            if (nearest == null || nearest > this.MAX_SHOW_DIST) {
                el.style.opacity = 0;
                el.style.display = 'none';
                return;
            }
            el.style.display = 'block';
            el.style.opacity = 1;
            return;
        }

        // Dim if no cars nearby
        el.style.display = 'block';

        if (nearest == null || nearest > this.MAX_SHOW_DIST) {
            el.style.opacity = 0.35;
        } else {
            el.style.opacity = 1;
        }
    }
}

// Initialize when page loads
document.addEventListener('DOMContentLoaded', async () => {
    const updater = new RadarUpdater();
    await updater.init();
});
</script>
{% endblock %}
