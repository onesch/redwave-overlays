{% extends "pages/card_detail/base_detail.html" %}

{% block title %}Overlays - {{ card_data.title }}{% endblock %}

{% block additional_settings %}
<div class="setting-container">
  <div class="setting-label">Type:</div>
  <div class="setting-value button-section">
    <button id="linearBtn" class="active">linear</button>
    <button id="circleBtn">circle</button>
    <button id="trackBtn">track</button>
  </div>
</div>
{% endblock %}

{% block overlay_scripts %}
<script>
document.addEventListener('DOMContentLoaded', async () => {
    const overlayName = 'track-map';
    const overlay = new OverlayBase(overlayName);

    const linearBtn = document.getElementById('linearBtn');
    const circleBtn = document.getElementById('circleBtn');
    const trackBtn = document.getElementById('trackBtn');
    const trackImg = document.getElementById('trackImage');

    document.getElementById('OpenBtn')?.addEventListener('click', () => {
        window.electronAPI.openTrackMap();
    });

    const savedTrackType = await window.electronAPI.getTrackType(overlayName);
    applyTrackType(savedTrackType || 'linear');

    linearBtn.addEventListener('click', () => {
        window.electronAPI.setTrackType(overlayName, 'linear');
        applyTrackType('linear');
    });

    circleBtn.addEventListener('click', () => {
        window.electronAPI.setTrackType(overlayName, 'circle');
        applyTrackType('circle');
    });

    trackBtn.addEventListener('click', () => {
        window.electronAPI.setTrackType(overlayName, 'track');
        applyTrackType('track');
    });

    function applyTrackType(type) {
        document.body.dataset.TrackType = type;
        linearBtn.classList.toggle('active', type === 'linear');
        circleBtn.classList.toggle('active', type === 'circle');
        trackBtn.classList.toggle('active', type === 'track');

        if (type === 'linear') {
            trackImg.src = trackImg.dataset.linear;
        } else if (type === 'circle') {
            trackImg.src = trackImg.dataset.circle;
        } else if (type === 'track') {
            trackImg.src = trackImg.dataset.track;
        }
    }
});
</script>
{% endblock %}
